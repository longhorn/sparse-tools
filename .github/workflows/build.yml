name: build
on:
  push:
    branches:
    - master
  pull_request:
jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    # Build binaries
    - name: Run ci
      run: make ci

    - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
      with:
        files: ./coverage.out
        flags: unittests
        token: ${{ secrets.CODECOV_TOKEN }}
